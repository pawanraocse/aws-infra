spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/cloud-infra

  jpa:
    show-sql: true

server:
  port: 8082

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    root: INFO
    com.learning.backendservice: DEBUG
    org.hibernate.SQL: DEBUG

# gRPC client targeting localhost auth-service for local dev
grpc:
  client:
    auth-grpc:
      address: static://localhost:9091
      negotiation-type: plaintext
